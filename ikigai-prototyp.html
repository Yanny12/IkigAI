function renderProfile() {
  return `
    <section class="panel" aria-label="Persönliches Profil">
      <div class="panel-header">
        <h2 class="panel-title">Persönliche Informationen</h2>
      </div>

      <form class="appointment-form">

        <div class="field-row">
          <div class="field">
            <label for="vorname">Vorname</label>
            <input id="vorname" type="text" placeholder="Max" />
          </div>

          <div class="field">
            <label for="nachname">Nachname</label>
            <input id="nachname" type="text" placeholder="Mustermann" />
          </div>
        </div>

        <div class="field">
          <label for="adresse">Wohnadresse</label>
          <input id="adresse" type="text" placeholder="Musterstrasse 1, 8000 Zürich" />
        </div>

        <div class="field-row">
          <div class="field">
            <label for="alter">Alter</label>
            <input id="alter" type="number" min="0" max="120" />
          </div>

          <div class="field">
            <label for="geschlecht">Geschlecht</label>
            <select id="geschlecht">
              <option>Weiblich</option>
              <option>Männlich</option>
              <option>Divers</option>
              <option>Keine Angabe</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="email">E-Mail Adresse</label>
          <input id="email" type="email" placeholder="max@beispiel.ch" />
        </div>

        <div class="field">
          <label for="telefon">Telefonnummer</label>
          <input id="telefon" type="tel" placeholder="+41 79 123 45 67" />
        </div>

        <button class="primary-button" type="submit">
          Profil speichern
        </button>

      </form>
    </section>
  `;
}
