<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ikigAI Prototype</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f5f7;
        --surface: rgba(255, 255, 255, 0.84);
        --surface-strong: #ffffff;
        --ink: #17171c;
        --muted: #6e6e73;
        --line: rgba(60, 60, 67, 0.17);
        --accent: #007aff;
        --accent-soft: #e7f1ff;
        --personal: #34c759;
        --business: #5856d6;
        --warning: #ff9f0a;
        --shadow: 0 24px 70px rgba(22, 26, 36, 0.18);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 20% 10%, rgba(0, 122, 255, 0.16), transparent 30%),
          radial-gradient(circle at 80% 18%, rgba(52, 199, 89, 0.12), transparent 26%),
          linear-gradient(145deg, #fbfbfd 0%, #eceff4 100%);
        color: var(--ink);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .stage {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .phone-shell {
        width: min(100%, 393px);
        height: min(852px, calc(100vh - 48px));
        min-height: 720px;
        border: 10px solid #111216;
        border-radius: 46px;
        background: var(--bg);
        box-shadow: var(--shadow);
        overflow: hidden;
        position: relative;
      }

      .phone-shell::before {
        content: "";
        position: absolute;
        top: 10px;
        left: 50%;
        width: 112px;
        height: 28px;
        transform: translateX(-50%);
        background: #111216;
        border-radius: 0 0 17px 17px;
        z-index: 4;
      }

      .status-bar {
        height: 48px;
        display: flex;
        justify-content: space-between;
        align-items: end;
        padding: 0 24px 9px;
        font-size: 13px;
        font-weight: 700;
        position: relative;
        z-index: 5;
      }

      .status-icons {
        font-size: 12px;
      }

      .app-root {
        height: calc(100% - 48px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .screen {
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .top-area {
        padding: 10px 18px 8px;
      }

      .app-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        display: grid;
        gap: 2px;
      }

      .brand-title {
        margin: 0;
        font-size: 32px;
        font-weight: 800;
      }

      .brand-subtitle {
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }

      .header-actions {
        display: flex;
        gap: 8px;
      }

      .icon-button {
        width: 38px;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.76);
        color: var(--ink);
        display: grid;
        place-items: center;
        font-size: 18px;
      }

      .quote {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(231, 241, 255, 0.9));
        border: 1px solid rgba(0, 122, 255, 0.12);
      }

      .quote p {
        margin: 0;
        font-size: 14px;
        line-height: 1.32;
        font-weight: 650;
      }

      .content {
        flex: 1;
        overflow-y: auto;
        padding: 6px 18px 88px;
      }

      .balance-panel {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        margin-top: 10px;
      }

      .section-kicker {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .section-title {
        margin: 3px 0 0;
        font-size: 21px;
      }

      .balance-ring {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        background: conic-gradient(var(--personal) 0 43%, var(--business) 43% 76%, var(--warning) 76% 100%);
        display: grid;
        place-items: center;
      }

      .balance-ring span {
        width: 58px;
        height: 58px;
        border-radius: 50%;
        background: var(--bg);
        display: grid;
        place-items: center;
        text-align: center;
        font-size: 11px;
        font-weight: 800;
        line-height: 1.05;
      }

      .goal-strip {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin: 16px 0;
      }

      .goal-button {
        min-height: 64px;
        padding: 9px 7px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface);
        text-align: left;
      }

      .goal-button.is-active {
        border-color: rgba(0, 122, 255, 0.42);
        background: var(--accent-soft);
      }

      .goal-icon {
        display: block;
        font-size: 19px;
      }

      .goal-label {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        font-weight: 750;
      }

      .panel {
        margin-top: 14px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--surface);
        backdrop-filter: blur(18px);
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .panel-title {
        margin: 0;
        font-size: 17px;
      }

      .chip {
        border: 0;
        border-radius: 999px;
        padding: 7px 10px;
        background: #eef0f4;
        color: var(--ink);
        font-size: 12px;
        font-weight: 750;
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: 54px repeat(3, minmax(0, 1fr));
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow: hidden;
        background: var(--surface-strong);
      }

      .calendar-cell {
        min-height: 54px;
        padding: 7px;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        font-size: 12px;
      }

      .calendar-cell:nth-child(4n) {
        border-right: 0;
      }

      .calendar-cell:nth-last-child(-n + 4) {
        border-bottom: 0;
      }

      .calendar-head {
        min-height: 38px;
        background: #f7f7fa;
        color: var(--muted);
        font-weight: 800;
      }

      .time-cell {
        color: var(--muted);
        font-weight: 750;
      }

      .event {
        display: block;
        padding: 6px;
        border-radius: 10px;
        color: #fff;
        font-size: 11px;
        font-weight: 750;
        line-height: 1.18;
      }

      .event.personal {
        background: var(--personal);
      }

      .event.business {
        background: var(--business);
      }

      .event.focus {
        background: var(--warning);
        color: #271600;
      }

      .appointment-form {
        display: grid;
        gap: 10px;
      }

      .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 5px;
      }

      .field label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .field input,
      .field select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 13px;
        background: rgba(255, 255, 255, 0.92);
        padding: 0 11px;
        color: var(--ink);
      }

      .primary-button {
        min-height: 46px;
        border: 0;
        border-radius: 15px;
        background: var(--accent);
        color: #fff;
        font-weight: 800;
      }

      .suggestions {
        display: grid;
        gap: 9px;
      }

      .suggestion {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 10px;
        border-radius: 16px;
        background: var(--surface-strong);
        border: 1px solid var(--line);
      }

      .suggestion-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .suggestion-title {
        display: block;
        font-size: 13px;
        font-weight: 800;
      }

      .suggestion-meta {
        color: var(--muted);
        font-size: 12px;
      }

      .bottom-nav {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 16px;
        height: 62px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(20px);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        padding: 7px;
      }

      .nav-button {
        border: 0;
        border-radius: 17px;
        background: transparent;
        color: var(--muted);
        display: grid;
        place-items: center;
        gap: 2px;
        font-size: 11px;
        font-weight: 750;
      }

      .nav-button.is-active {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .nav-icon {
        font-size: 17px;
      }

      @media (max-width: 450px) {
        .stage {
          padding: 0;
        }

        .phone-shell {
          width: 100%;
          height: 100vh;
          min-height: 100vh;
          border: 0;
          border-radius: 0;
        }

        .phone-shell::before {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="ikigAI iPhone App Prototyp">
      <section class="phone-shell">
        <div class="status-bar" aria-hidden="true">
          <span>9:41</span>
          <span class="status-icons">5G 100%</span>
        </div>
        <div id="app" class="app-root"></div>
      </section>
    </main>

    <script>
      const motivationalQuotes = [
        "Plane den Tag so, dass Erfolg und Erholung beide Platz bekommen.",
        "Balance entsteht nicht zufaellig, sondern durch bewusste Termine.",
        "Ein guter Kalender schuetzt, was dir wichtig ist.",
        "Heute zaehlt nicht nur, was du erledigst, sondern auch, wie du dich fuehlst."
      ];

      const goals = [
        { id: "balance", icon: "◎", label: "Balance", title: "Ausgewogen planen" },
        { id: "work", icon: "▣", label: "Beruf", title: "Fokuszeit sichern" },
        { id: "life", icon: "♡", label: "Privat", title: "Freizeit blocken" }
      ];

      const suggestedSlots = [
        { title: "Sport & Reset", meta: "Freitag, 17:30 - 18:15", type: "personal" },
        { title: "Kunden-Call", meta: "Montag, 09:30 - 10:00", type: "business" },
        { title: "Fokusblock ohne Meetings", meta: "Dienstag, 14:00 - 15:30", type: "focus" }
      ];

      const days = ["Fr", "Sa", "So"];
      const times = ["07:00", "08:00", "09:00", "10:00", "11:00", "12:00"];

      const state = {
        activeGoal: "balance",
        quoteIndex: new Date().getDate() % motivationalQuotes.length,
        events: [
          { id: 1, day: "Fr", time: "07:00", title: "Jogging", type: "personal" },
          { id: 2, day: "Fr", time: "08:00", title: "Team Meeting", type: "business" },
          { id: 3, day: "Sa", time: "10:00", title: "Familie", type: "personal" },
          { id: 4, day: "So", time: "09:00", title: "Deep Work", type: "focus" }
        ]
      };

      const app = document.querySelector("#app");

      function renderHeader(quote) {
        return `
          <header class="top-area">
            <div class="app-header">
              <div class="brand">
                <h1 class="brand-title">ikigAI</h1>
                <span class="brand-subtitle">Work-Life Terminplanung</span>
              </div>
              <div class="header-actions" aria-label="Profil und Einstellungen">
                <button class="icon-button" type="button" title="Profil" aria-label="Profil">◠</button>
                <button class="icon-button" type="button" title="Einstellungen" aria-label="Einstellungen">⚙</button>
              </div>
            </div>
            <section class="quote" aria-label="Motivationsspruch">
              <p>${quote}</p>
            </section>
          </header>
        `;
      }

      function renderBalancePanel(activeGoal) {
        const goal = goals.find((item) => item.id === activeGoal) ?? goals[0];

        return `
          <section class="balance-panel" aria-label="Tagesziel">
            <div>
              <span class="section-kicker">Heute</span>
              <h2 class="section-title">${goal.title}</h2>
            </div>
            <div class="balance-ring" aria-label="Balance Score 76 Prozent">
              <span>76%<br />Balance</span>
            </div>
          </section>
        `;
      }

      function renderGoalStrip(activeGoal) {
        return `
          <nav class="goal-strip" aria-label="Zielauswahl">
            ${goals
              .map(
                (goal) => `
                  <button class="goal-button ${goal.id === activeGoal ? "is-active" : ""}" type="button" data-goal="${goal.id}">
                    <span class="goal-icon">${goal.icon}</span>
                    <span class="goal-label">${goal.label}</span>
                  </button>
                `
              )
              .join("")}
          </nav>
        `;
      }

      function renderCalendar(events) {
        return `
          <section class="panel" aria-label="Wochenkalender">
            <div class="panel-header">
              <h2 class="panel-title">Freitag, 29.05.2026</h2>
              <button class="chip" type="button">Woche 1</button>
            </div>
            <div class="calendar-grid">
              <div class="calendar-cell calendar-head"></div>
              ${days.map((day) => `<div class="calendar-cell calendar-head">${day}</div>`).join("")}
              ${times
                .map((time) => {
                  const rowEvents = days
                    .map((day) => {
                      const event = events.find((item) => item.day === day && item.time === time);
                      return `
                        <div class="calendar-cell">
                          ${event ? `<span class="event ${event.type}">${event.title}</span>` : ""}
                        </div>
                      `;
                    })
                    .join("");

                  return `<div class="calendar-cell time-cell">${time}</div>${rowEvents}`;
                })
                .join("")}
            </div>
          </section>
        `;
      }

      function renderAppointmentForm() {
        return `
          <section class="panel" aria-label="Termin erfassen">
            <div class="panel-header">
              <h2 class="panel-title">Termin planen</h2>
              <span class="chip">AI Vorschlag</span>
            </div>
            <form class="appointment-form" id="appointmentForm">
              <div class="field">
                <label for="title">Titel</label>
                <input id="title" name="title" type="text" value="Coffee Chat" />
              </div>
              <div class="field-row">
                <div class="field">
                  <label for="type">Bereich</label>
                  <select id="type" name="type">
                    <option value="personal">Privat</option>
                    <option value="business">Geschaeftlich</option>
                    <option value="focus">Fokus</option>
                  </select>
                </div>
                <div class="field">
                  <label for="time">Zeit</label>
                  <select id="time" name="time">
                    ${times.map((time) => `<option>${time}</option>`).join("")}
                  </select>
                </div>
              </div>
              <button class="primary-button" type="submit">Termin eintragen</button>
            </form>
          </section>
        `;
      }

      function renderSuggestions() {
        return `
          <section class="panel" aria-label="Empfohlene Slots">
            <div class="panel-header">
              <h2 class="panel-title">Freie Ziele</h2>
              <button class="chip" type="button">Mehr</button>
            </div>
            <div class="suggestions">
              ${suggestedSlots
                .map(
                  (slot) => `
                    <article class="suggestion">
                      <span class="suggestion-dot event ${slot.type}"></span>
                      <div>
                        <span class="suggestion-title">${slot.title}</span>
                        <span class="suggestion-meta">${slot.meta}</span>
                      </div>
                      <span aria-hidden="true">›</span>
                    </article>
                  `
                )
                .join("")}
            </div>
          </section>
        `;
      }

      function renderBottomNav() {
        const items = [
          ["Kalender", "▦"],
          ["Ziele", "◎"],
          ["AI", "✦"],
          ["Profil", "◠"]
        ];

        return `
          <nav class="bottom-nav" aria-label="Hauptnavigation">
            ${items
              .map(
                ([label, icon], index) => `
                  <button class="nav-button ${index === 0 ? "is-active" : ""}" type="button">
                    <span class="nav-icon">${icon}</span>
                    <span>${label}</span>
                  </button>
                `
              )
              .join("")}
          </nav>
        `;
      }

      function render() {
        app.innerHTML = `
          <section class="screen">
            ${renderHeader(motivationalQuotes[state.quoteIndex])}
            <div class="content">
              ${renderBalancePanel(state.activeGoal)}
              ${renderGoalStrip(state.activeGoal)}
              ${renderCalendar(state.events)}
              ${renderAppointmentForm()}
              ${renderSuggestions()}
            </div>
            ${renderBottomNav()}
          </section>
        `;

        document.querySelectorAll("[data-goal]").forEach((button) => {
          button.addEventListener("click", () => {
            state.activeGoal = button.dataset.goal;
            render();
          });
        });

        document.querySelector("#appointmentForm").addEventListener("submit", (event) => {
          event.preventDefault();
          const data = new FormData(event.currentTarget);
          const type = data.get("type");

          state.events = [
            ...state.events,
            {
              id: Date.now(),
              day: "Sa",
              time: data.get("time"),
              title: data.get("title") || "Neuer Termin",
              type
            }
          ];

          render();
        });
      }

      

      render();
    </script>
  </body>
</html>
